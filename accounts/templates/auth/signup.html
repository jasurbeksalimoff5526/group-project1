{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="glass p-10 md:p-14 rounded-[3rem] shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>
        
        <h2 class="text-4xl font-black mb-10 text-center tracking-tight">
            Yangi <span class="text-indigo-500">hisob</span> ochish
        </h2>

        <form method="post" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="space-y-2 {% if field.name == 'bio' %}md:col-span-2{% endif %}">
                    <label class="text-sm font-semibold text-gray-400 ml-1">
                        {{ field.label }}
                    </label>
                    <div class="relative">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p class="text-red-400 text-[10px] mt-1 ml-1 font-medium animate-pulse">
                            {{ field.errors.0 }}
                        </p>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="md:col-span-2 pt-6">
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-500 hover:scale-[1.01] transition-all duration-300 shadow-xl shadow-indigo-500/20">
                    RO'YXATDAN O'TISH
                </button>
                <p class="text-center text-gray-500 text-sm mt-6">
                    Akkauntingiz bormi? <a href="{% url 'login' %}" class="text-indigo-400 hover:underline">Kirish</a>
                </p>
            </div>
        </form>
    </div>
</div>

<style>
    /* base.html ichida bo'lmasa, shu yerga qo'shing */
    .form-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 1rem !important;
        padding: 0.85rem 1.25rem !important;
        color: white !important;
        outline: none !important;
        transition: all 0.3s ease;
    }
    .form-input:focus {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: #6366f1 !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15) !important;
    }
    /* Placeholder rangini to'g'rilash */
    .form-input::placeholder {
        color: rgba(255, 255, 255, 0.2);
    }
</style>
{% endblock %}
