{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-in py-6">
    <div class="glass p-8 md:p-14 rounded-[3.5rem] shadow-2xl relative overflow-hidden border border-white/5">
        
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-indigo-600/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-cyan-600/10 rounded-full blur-3xl animate-pulse"></div>
        
        <div class="relative">
            <h3 class="text-4xl font-black mb-2 tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
                PROFILNI <span class="text-white">TAHRIRLASH</span>
            </h3>
            <p class="text-gray-500 text-sm mb-10 font-medium italic border-l-2 border-indigo-500/30 pl-4">
                Ma'lumotlaringizni yangilang va shaxsiy sahifangizni jozibali qiling.
            </p>
            
            <form method="post" enctype="multipart/form-data" class="space-y-8">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="space-y-3">
                        <label class="text-sm font-bold text-gray-400 ml-1 flex items-center gap-2">
                            {% if field.name == 'avatar' %}🖼️{% elif field.name == 'bio' %}✍️{% else %}👤{% endif %}
                            {{ field.label }}
                        </label>
                        
                        <div class="relative group">
                            {{ field }}
                            <div class="absolute bottom-0 left-0 w-0 h-[1px] bg-gradient-to-r from-indigo-500 to-cyan-500 group-focus-within:w-full transition-all duration-500"></div>
                        </div>

                        {% if field.errors %}
                            <p class="text-red-400 text-[10px] mt-1 ml-1 font-semibold animate-bounce uppercase tracking-wider">
                                {{ field.errors.0 }}
                            </p>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="flex flex-col sm:flex-row gap-4 pt-8">
                    <button type="submit" class="flex-grow py-4 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white rounded-2xl font-black hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-xl shadow-indigo-600/20 uppercase tracking-widest text-xs">
                        SAQLASH
                    </button>
                    <a href="{% url 'profile' user.id %}" class="px-10 py-4 glass border-white/10 rounded-2xl font-bold text-center hover:bg-white/5 transition-all text-xs uppercase tracking-widest text-gray-400">
                        BEKOR QILISH
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Inputlar dizayni */
    input[type="text"], 
    input[type="email"], 
    textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        border-radius: 1.25rem !important;
        padding: 1rem 1.5rem !important;
        color: white !important;
        outline: none !important;
        transition: all 0.3s ease;
    }

    textarea {
        min-height: 120px;
        resize: none;
    }

    input:focus, textarea:focus {
        background: rgba(255, 255, 255, 0.06) !important;
        border-color: rgba(99, 102, 241, 0.4) !important;
        box-shadow: 0 0 25px rgba(99, 102, 241, 0.1) !important;
    }

    /* Fayl tanlash tugmasini (Avatar) chiroyli qilish */
    input[type="file"] {
        width: 100%;
        color: #94a3b8;
        font-size: 0.875rem;
    }
    input[type="file"]::file-selector-button {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.75rem;
        padding: 0.5rem 1rem;
        color: white;
        margin-right: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }
    input[type="file"]::file-selector-button:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #6366f1;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
</style>
{% endblock %}
