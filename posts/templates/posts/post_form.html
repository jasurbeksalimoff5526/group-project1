{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto glass p-10 rounded-[2.5rem]">
    <h2 class="text-3xl font-black mb-8">YANGI <span class="text-indigo-500">MAQOLA</span></h2>
    <form method="post" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="text-sm text-gray-400 block mb-2">Sarlavha</label>
            <input type="text" name="title" required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
            <label class="text-sm text-gray-400 block mb-2">Kategoriya</label>
            <select name="category" class="w-full bg-gray-900 border border-white/10 rounded-xl px-5 py-3 text-white">
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-400 block mb-2">Rasm</label>
            <input type="file" name="image" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-500/10 file:text-indigo-400 hover:file:bg-indigo-500/20">
        </div>
        <div>
            <label class="text-sm text-gray-400 block mb-2">Maqola matni</label>
            <textarea name="content" rows="6" required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 text-white focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
        </div>
        <button type="submit" class="w-full py-4 bg-indigo-600 rounded-2xl font-bold hover:bg-indigo-500 transition shadow-lg shadow-indigo-500/20">POSTNI CHIQARISH</button>
    </form>
</div>
{% endblock %}
