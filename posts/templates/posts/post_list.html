{% extends 'base.html' %}
{% block content %}
<div class="space-y-10">
    <h2 class="text-4xl font-black italic">YANGI <span class="text-indigo-500">POSTLAR</span></h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for post in posts %}
        <div class="glass rounded-[2rem] overflow-hidden hover:scale-[1.02] transition duration-300">
            {% if post.image %}
                <img src="{{ post.image.url }}" class="w-full h-48 object-contain bg-black">
            {% endif %}
            <div class="p-6 space-y-4">
                <span class="px-3 py-1 bg-indigo-500/20 text-indigo-400 text-xs rounded-full">{{ post.category.name }}</span>
                <h3 class="text-xl font-bold leading-tight">{{ post.title }}</h3>
                <p class="text-gray-400 text-sm line-clamp-2">{{ post.content }}</p>
                <div class="flex justify-between items-center pt-4 border-t border-white/5">
                    <span class="text-xs text-gray-500">👁️ {{ post.views }}</span>
                    <a href="{% url 'post_detail' post.pk %}" class="text-indigo-400 font-bold text-sm">O'qish →</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
